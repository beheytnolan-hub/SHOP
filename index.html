<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SHOP — Premium Mobile & PC</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent: #ff3e6c;
      --accent-hover: #ff1e53;
      --bg: #09090b;
      --bg-card: #141417;
      --bg-nav: rgba(9, 9, 11, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    h1, h2, h3, .logo { font-family: 'Space Grotesk', sans-serif; }

    /* NAVIGATION OPTIMISÉE MOCKUP APP */
    nav { 
      position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
      height: 70px; display: flex; align-items: center; justify-content: space-between; 
      padding: 0 5%; background: var(--bg-nav); border-bottom: 1px solid var(--border); 
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    }
    .logo { font-size: 1.6rem; font-weight: 700; letter-spacing: -1px; text-decoration: none; color: var(--text); cursor: pointer; user-select: none; }
    .logo span { color: var(--accent); }
    .nav-actions { display: flex; align-items: center; gap: 15px; }
    .nav-btn { background: transparent; border: none; color: var(--text); font-size: 1.1rem; cursor: pointer; position: relative; padding: 10px; display: flex; align-items: center; }
    .cart-count { position: absolute; top: 2px; right: 2px; background: var(--accent); color: white; font-size: 0.65rem; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

    /* BARRE CATEGORIES DÉFILANTE SANS SACCADE */
    .categories-bar { padding: 95px 5% 15px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .categories-bar::-webkit-scrollbar { display: none; }
    .cat-chip { padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 100px; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
    .cat-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* HERO BANNER ADAPTATIF */
    .hero { padding: 20px 5%; max-width: 1400px; margin: 0 auto; }
    .hero-banner { background: linear-gradient(135deg, #18181b 0%, #27272a 100%); border: 1px solid var(--border); border-radius: 24px; padding: 40px 30px; position: relative; overflow: hidden; }
    .hero h1 { font-size: clamp(2rem, 4vw, 3.5rem); max-width: 600px; line-height: 1.1; margin-bottom: 15px; letter-spacing: -1px; }
    .hero p { color: var(--text-muted); font-size: 1rem; max-width: 450px; margin-bottom: 25px; line-height: 1.5; }

    /* BOUTONS GRAND FORMAT POUR LE POUCE */
    .btn { padding: 14px 28px; border-radius: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; font-size: 0.95rem; justify-content: center; }
    .btn-primary { background: var(--accent); color: white; border: none; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }

    /* GRID PRODUITS HYBRIDE (PC MULTI-COLONNES / TEL 2 COLONNES OU 1) */
    .shop-container { padding: 30px 5%; max-width: 1400px; margin: 0 auto; }
    .grid-title { margin-bottom: 25px; font-size: 1.6rem; letter-spacing: -0.5px; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
    
    .product-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; transition: transform 0.3s, border-color 0.3s; display: flex; flex-direction: column; }
    .prod-img-wrapper { width: 100%; aspect-ratio: 1; background: #1a1a1e; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .prod-img { width: 100%; height: 100%; object-fit: cover; }
    .prod-content { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
    .prod-cat { font-size: 0.7rem; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; }
    .prod-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 6px; color: #fff; }
    .prod-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 15px; }
    .prod-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; gap: 10px; }
    .prod-price { font-size: 1.25rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }

    /* PANIER ERGONOMIQUE MOBILE (S'OUVRE EN PLEIN ÉCRAN SUR TEL) */
    .sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; background: #0c0c0e; border-left: 1px solid var(--border); z-index: 200; box-shadow: -10px 0 40px rgba(0,0,0,0.6); transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; padding: 24px; }
    .sidebar.open { right: 0; }
    .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
    .sidebar-close { background: none; border: none; color: var(--text-muted); font-size: 1.6rem; cursor: pointer; padding: 5px; }
    .cart-items { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .cart-item { display: flex; gap: 15px; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
    .cart-footer { padding-top: 20px; border-top: 1px solid var(--border); }

    /* FENÊTRES MODALES ET PANEL ADMIN FULL RESPONSIVE */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 300; display: none; align-items: center; justify-content: center; padding: 15px; }
    .admin-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 28px; width: 100%; max-width: 650px; max-height: 92vh; overflow-y: auto; padding: 30px 20px; }
    .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); padding-left: 4px; }
    .form-group input, .form-group select, .form-group textarea { background: var(--bg); border: 1px solid var(--border); color: white; padding: 14px 18px; border-radius: 14px; font-family: inherit; font-size: 0.95rem; outline: none; width: 100%; }
    .form-group textarea { border-radius: 16px; min-height: 90px; resize: none; }
    .admin-nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 0.95rem; cursor: pointer; padding: 8px 12px; font-weight: 600; position: relative; }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -10px; left: 0; right: 0; height: 3px; background: var(--accent); border-radius: 10px; }
    .order-row { background: var(--bg); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
    .order-header { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 8px; font-size: 0.95rem; }
    .loading-text { font-size: 1rem; text-align: center; color: var(--text-muted); padding: 50px 20px; grid-column: 1/-1; line-height: 1.6; }

    /* ════════════════════════════════════════════════ */
    /* ZONE CRITIQUE DESIGN : SPÉCIAL TÉLÉPHONES MOBILE */
    /* ════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      nav { height: 65px; padding: 0 4%; }
      .categories-bar { padding: 85px 4% 12px; gap: 8px; }
      .cat-chip { padding: 8px 16px; font-size: 0.85rem; }
      .hero { padding: 10px 4%; }
      .hero-banner { padding: 30px 20px; border-radius: 20px; }
      .hero h1 { font-size: 1.85rem; }
      .hero p { font-size: 0.9rem; margin-bottom: 20px; }
      .btn { width: 100%; padding: 14px 20px; border-radius: 14px; }
      
      .shop-container { padding: 20px 4%; }
      /* Grille fluide : Passe en 2 colonnes ultra-propres sur mobile au lieu de s'entasser */
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .product-card { border-radius: 16px; }
      .prod-content { padding: 12px; }
      .prod-title { font-size: 0.95rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .prod-desc { font-size: 0.78rem; line-height: 1.3; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .prod-footer { flex-direction: column; align-items: flex-start; gap: 8px; }
      .prod-price { font-size: 1.1rem; }
      .prod-footer .btn { padding: 10px 12px; font-size: 0.8rem; border-radius: 10px; }
      
      /* Panier plein écran sur mobile pour le confort */
      .sidebar { width: 100%; max-width: 100%; right: -100%; padding: 20px; }
      .admin-box { padding: 25px 15px; border-radius: 24px; max-height: 95vh; }
    }

    @media (max-width: 380px) {
      /* Pour les très petits écrans de smartphone (iPhone SE...) : 1 seule grande colonne */
      .products-grid { grid-template-columns: 1fr; gap: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" ondblclick="openSecretAdmin()">SHOP<span>.</span></a>
    <div class="nav-actions">
      <button class="nav-btn" onclick="toggleCart(true)">
        🛒 <span class="cart-count" id="cart-count">0</span>
      </button>
    </div>
  </nav>

  <div class="categories-bar" id="categories-container"></div>

  <header class="hero">
    <div class="hero-banner">
      <h1>Vos articles préférés, partout.</h1>
      <p>Boutique 100% optimisée pour votre smartphone. Achetez en un clic.</p>
      <button class="btn btn-primary" onclick="document.getElementById('shop-section').scrollIntoView()">Voir le catalogue</button>
    </div>
  </header>

  <main class="shop-container" id="shop-section">
    <h2 class="grid-title" id="grid-title">Tous les articles</h2>
    <div class="products-grid" id="products-container">
      <div class="loading-text">Chargement sécurisé du catalogue cloud...</div>
    </div>
  </main>

  <div class="sidebar" id="cart-sidebar">
    <div class="sidebar-header">
      <h3>Mon Panier</h3>
      <button class="sidebar-close" onclick="toggleCart(false)">✕</button>
    </div>
    <div class="cart-items" id="cart-items-container"></div>
    <div class="cart-footer">
      <div style="display:flex; justify-content:space-between; font-size:1.2rem; font-weight:700; margin-bottom:20px;">
        <span>Total</span> <span id="cart-total-price">0.00 €</span>
      </div>
      <button class="btn btn-primary" style="width: 100%;" onclick="processCheckout()">
        💳 Valider et Payer
      </button>
    </div>
  </div>

  <div class="modal-overlay" id="login-modal">
    <div class="admin-box" style="max-width: 400px; text-align: center;">
      <h2 style="margin-bottom: 20px;">🔐 Connexion Privée</h2>
      <div class="form-group"><input type="text" id="admin-user" placeholder="Identifiant"></div>
      <div class="form-group"><input type="password" id="admin-pass" placeholder="Mot de passe"></div>
      <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="verifyAdminLogin()">Ouvrir le panneau</button>
      <button class="btn btn-secondary" style="width: 100%; margin-top: 10px; border:none;" onclick="closeModal('login-modal')">Annuler</button>
    </div>
  </div>

  <div class="modal-overlay" id="admin-dashboard-modal">
    <div class="admin-box">
      <div style="display: flex; justify-content: space-between; align-items:center; margin-bottom: 20px;">
        <h3>🛠️ Console Cloud</h3>
        <button class="sidebar-close" onclick="closeModal('admin-dashboard-modal')">✕</button>
      </div>

      <div class="admin-nav-tabs">
        <button class="tab-btn active" id="tab-prod-btn" onclick="switchTab('products')">📦 En ligne</button>
        <button class="tab-btn" id="tab-orders-btn" onclick="switchTab('orders')">📋 Commandes (<span id="orders-badge">0</span>)</button>
      </div>

      <div id="admin-products-section">
        <div style="background: var(--bg); padding:15px; border-radius:16px; margin-bottom:20px; border:1px solid var(--border);">
          <h5 style="margin-bottom: 8px;">➕ Créer une catégorie</h5>
          <div style="display: flex; gap: 10px; flex-direction: row;">
            <input type="text" id="new-cat-name" placeholder="Ex: Montres" style="background:var(--bg-card); padding:10px 15px;">
            <button class="btn btn-secondary" style="padding:0 20px;" onclick="addCategoryLocal()">Créer</button>
          </div>
        </div>

        <h5 style="margin-bottom: 12px;">📦 Mettre en vente un produit</h5>
        <form id="product-form" onsubmit="addProductCloud(event)">
          <div class="form-group"><label>Nom du produit</label><input type="text" id="p-title" required></div>
          <div class="form-group"><label>Prix (€)</label><input type="number" id="p-price" step="0.01" required></div>
          <div class="form-group"><label>Catégorie</label><select id="p-cat"></select></div>
          <div class="form-group"><label>Lien URL de l'image</label><input type="text" id="p-img" placeholder="https://..."></div>
          <div class="form-group"><label>Description</label><textarea id="p-desc" required></textarea></div>
          <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%;">Publier l'article</button>
        </form>
      </div>

      <div id="admin-orders-section" style="display: none;">
        <div id="orders-log-container"></div>
      </div>
    </div>
  </div>

  <script>
    // ═════════════════════════════════════════════════════════════════
    // CONNEXION AVEC TON URL MOCKAPI PERSONNELLE
    // ═════════════════════════════════════════════════════════════════
    const API_URL = "https://6a1eabd8b79eec0d6cefd6ee.mockapi.io/products"; 

    let categories = JSON.parse(localStorage.getItem('shop_cats')) || ['Tech', 'Mode', 'Design'];
    let products = [];
    let orders = JSON.parse(localStorage.getItem('shop_orders')) || [];
    let cart = [];

    document.addEventListener("DOMContentLoaded", () => {
      fetchProductsFromCloud();
      renderCategories();
      updateCartUI();
      document.getElementById('orders-badge').innerText = orders.length;

      window.addEventListener('keydown', (e) => {
        if(e.key === 'a' || e.key === 'A') openSecretAdmin();
      });
    });

    async function fetchProductsFromCloud() {
      try {
        const res = await fetch(API_URL);
        if(res.ok) {
          products = await res.json();
          products.reverse();
          renderProducts();
        }
      } catch (error) {
        console.error("Erreur Cloud:", error);
      }
    }

    function openSecretAdmin() { document.getElementById('login-modal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function verifyAdminLogin() {
      const u = document.getElementById('admin-user').value;
      const p = document.getElementById('admin-pass').value;
      if(u === "admin" && p === "shop2026") {
        closeModal('login-modal');
        document.getElementById('admin-dashboard-modal').style.display = 'flex';
        const select = document.getElementById('p-cat');
        select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        renderOrders();
      } else {
        alert("Identifiants incorrects.");
      }
    }

    function switchTab(tab) {
      if(tab === 'products') {
        document.getElementById('admin-products-section').style.display = 'block';
        document.getElementById('admin-orders-section').style.display = 'none';
        document.getElementById('tab-prod-btn').classList.add('active');
        document.getElementById('tab-orders-btn').classList.remove('active');
      } else {
        document.getElementById('admin-products-section').style.display = 'none';
        document.getElementById('admin-orders-section').style.display = 'block';
        document.getElementById('tab-prod-btn').classList.remove('active');
        document.getElementById('tab-orders-btn').classList.add('active');
        renderOrders();
      }
    }

    function renderCategories() {
      const container = document.getElementById('categories-container');
      let html = `<button class="cat-chip active" id="cat-all" onclick="filterCategory('all')">Tout voir</button>`;
      html += categories.map(c => `<button class="cat-chip" id="cat-${c}" onclick="filterCategory('${c}')">${c}</button>`).join('');
      container.innerHTML = html;
    }

    function renderProducts(filter = "all") {
      const container = document.getElementById('products-container');
      const filtered = filter === "all" ? products : products.filter(p => p.cat === filter);
      
      if(filtered.length === 0) {
        container.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:30px; font-size:0.9rem;">Aucun produit disponible.</div>`;
        return;
      }

      container.innerHTML = filtered.map(p => `
        <div class="product-card">
          <div class="prod-img-wrapper">
            ${p.img ? `<img src="${p.img}" class="prod-img" onerror="this.style.display='none'"/>` : ''}
            <span style="font-size:2rem; position:absolute; z-index:1; opacity:0.15;">✨</span>
          </div>
          <div class="prod-content">
            <span class="prod-cat">${escapeHtml(p.cat)}</span>
            <h3 class="prod-title">${escapeHtml(p.title)}</h3>
            <p class="prod-desc">${escapeHtml(p.desc)}</p>
            <div class="prod-footer">
              <span class="prod-price">${parseFloat(p.price).toFixed(2)} €</span>
              <button class="btn btn-secondary" onclick="addToCart('${p.id}')">🛒+ </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterCategory(cat) {
      document.querySelectorAll('.cat-chip').forEach(btn => btn.classList.remove('active'));
      if(cat === 'all') { document.getElementById('cat-all').classList.add('active'); } 
      else { document.getElementById(`cat-${cat}`).classList.add('active'); }
      renderProducts(cat);
    }

    function addCategoryLocal() {
      const input = document.getElementById('new-cat-name');
      const name = input.value.trim();
      if(!name || categories.includes(name)) return;
      categories.push(name);
      localStorage.setItem('shop_cats', JSON.stringify(categories));
      input.value = "";
      renderCategories();
      const select = document.getElementById('p-cat');
      select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    async function addProductCloud(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.innerText = "Mise en ligne cloud...";
      btn.disabled = true;

      const title = document.getElementById('p-title').value.trim();
      const price = parseFloat(document.getElementById('p-price').value);
      const cat = document.getElementById('p-cat').value;
      const img = document.getElementById('p-img').value.trim();
      const desc = document.getElementById('p-desc').value.trim();

      const newProd = { title, price, cat, img, desc };

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newProd)
        });

        if(res.ok) {
          document.getElementById('product-form').reset();
          closeModal('admin-dashboard-modal');
          await fetchProductsFromCloud();
          alert("Article publié avec succès !");
        }
      } catch (err) {
        alert("Erreur de connexion.");
      } finally {
        btn.innerText = "Publier l'article";
        btn.disabled = false;
      }
    }

    function renderOrders() {
      const container = document.getElementById('orders-log-container');
      if(orders.length === 0) {
        container.innerHTML = `<p style="color:var(--text-muted); text-align:center; font-size:0.9rem;">Aucune commande.</p>`;
        return;
      }
      container.innerHTML = orders.map(o => `
        <div class="order-row">
          <div class="order-header">
            <span>📦 Commande #${o.id}</span>
            <span style="color:var(--accent);">${o.total}</span>
          </div>
          <div style="font-size:0.85rem; color:var(--text-muted); line-height:1.4;">
            <p><strong>Client :</strong> ${escapeHtml(o.client)}</p>
            <p><strong>Articles :</strong> ${escapeHtml(o.items)}</p>
          </div>
        </div>
      `).join('');
    }

    function toggleCart(open) { document.getElementById('cart-sidebar').classList.toggle('open', open); }
    
    function addToCart(id) {
      const p = products.find(prod => prod.id == id);
      if(p) { cart.push(p); updateCartUI(); toggleCart(true); }
    }

    function updateCartUI() {
      document.getElementById('cart-count').innerText = cart.length;
      const container = document.getElementById('cart-items-container');
      if(cart.length === 0) {
        container.innerHTML = `<p style="text-align:center; color:var(--text-muted); padding-top:30px; font-size:0.9rem;">Votre panier est vide.</p>`;
        document.getElementById('cart-total-price').innerText = "0.00 €";
        return;
      }
      container.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div style="flex-grow:1;">
            <div style="font-weight:600; font-size:0.9rem; color:white;">${escapeHtml(item.title)}</div>
            <div style="color:var(--accent); font-weight:700; font-size:0.85rem; margin-top:2px;">${parseFloat(item.price).toFixed(2)} €</div>
          </div>
        </div>
      `).join('');
      const total = cart.reduce((s, i) => s + i.price, 0);
      document.getElementById('cart-total-price').innerText = `${total.toFixed(2)} €`;
    }

    function processCheckout() {
      if(cart.length === 0) return;
      const clientName = prompt("Entrez votre nom complet pour valider l'achat :");
      if(!clientName) return;

      const total = cart.reduce((s, i) => s + i.price, 0);
      const newOrder = {
        id: Math.floor(1000 + Math.random() * 9000),
        client: clientName,
        total: `${total.toFixed(2)} €`,
        items: cart.map(i => i.title).join(', ')
      };

      orders.unshift(newOrder);
      localStorage.setItem('shop_orders', JSON.stringify(orders));
      document.getElementById('orders-badge').innerText = orders.length;

      alert(`💳 Achat validé ! Merci ${clientName}. L'administrateur a bien reçu la commande.`);
      cart = [];
      updateCartUI();
      toggleCart(false);
    }

    function escapeHtml(str) {
      if(!str) return '';
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
